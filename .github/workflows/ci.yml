name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      - name: Run tests
        env:
          TRADING_MODE: simulation
          PAPER_TRADING: "true"
        run: pytest tests/ -v --tb=short -x

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for secrets
        run: |
          # Fail if .env is tracked
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env is tracked by git!"
            exit 1
          fi
          # Scan for hardcoded keys (common patterns)
          if grep -rn "ALPACA_API_KEY=PK\|ALPACA_SECRET_KEY=FD\|sk-ant-" --include="*.py" --include="*.html" --include="*.js" .; then
            echo "ERROR: Possible hardcoded secrets found!"
            exit 1
          fi
          echo "No secrets detected."
