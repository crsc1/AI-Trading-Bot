syntax = "proto3";

package market;

message Tick {
  double price = 1;
  int64 size = 2;
  string side = 3;
  int64 timestamp_ms = 4;
}

message Candle {
  double open = 1;
  double high = 2;
  double low = 3;
  double close = 4;
  int64 volume = 5;
  int64 timestamp = 6;
}

message Quote {
  double bid = 1;
  double ask = 2;
  int64 bid_size = 3;
  int64 ask_size = 4;
  int64 timestamp_ms = 5;
}

message FlowEvent {
  string type = 1;
  Tick tick = 2;
  SweepEvent sweep = 3;
  AbsorptionEvent absorption = 4;
}

message SweepEvent {
  string direction = 1;
  double notional = 2;
  repeated double strikes = 3;
}

message AbsorptionEvent {
  double price = 1;
  string direction = 2;
  int64 volume = 3;
}

message MarketMessage {
  string event = 1;
  oneof payload {
    Tick tick = 2;
    Candle candle = 3;
    Quote quote = 4;
    FlowEvent flow = 5;
  }
}
