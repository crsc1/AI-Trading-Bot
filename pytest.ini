[pytest]
# Pytest configuration for AI Trading Bot test suite

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Asyncio mode configuration
asyncio_mode = auto

# Markers for organizing tests
markers =
    asyncio: marks tests as async (deselect with '-m "not asyncio"')
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    health: marks tests as health checks
    market_levels: marks tests for market structure calculations
    confluence: marks tests for confluence evaluation
    agents: marks tests for agent API endpoints
    slow: marks tests as slow (deselect with '-m "not slow"')

# Test output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (if pytest-cov is installed)
# --cov=dashboard
# --cov-report=term-missing
# --cov-report=html

# Minimum Python version
minversion = 3.8

# Test timeout (requires pytest-timeout)
# timeout = 300
